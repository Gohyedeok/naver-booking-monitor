<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>네이버 예약 모니터</title>
  <style>
    :root { --green: #03C75A; --red: #ff4d4f; --bg: #f4f6f8; --card: #fff; --text: #1a1a1a; --sub: #8c8c8c; --border: #e8e8e8; }
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; padding-bottom: 100px; }

    header { background: var(--green); color: #fff; padding: 20px 16px 16px; position: sticky; top: 0; z-index: 50; }
    header h1 { font-size: 18px; font-weight: 700; }
    header p  { font-size: 12px; opacity: .85; margin-top: 3px; }

    .content { max-width: 540px; margin: 0 auto; padding: 14px 14px 0; }

    /* Card */
    .card { background: var(--card); border-radius: 14px; padding: 16px; margin-bottom: 12px; box-shadow: 0 1px 6px rgba(0,0,0,.07); }

    /* Settings */
    .settings-header { display: flex; justify-content: space-between; align-items: center; cursor: pointer; }
    .settings-header span { font-weight: 600; font-size: 14px; }
    .settings-body { display: none; margin-top: 14px; }
    .settings-body.open { display: block; }

    /* Form elements */
    .form-group { margin-bottom: 14px; }
    label { display: block; font-size: 12px; font-weight: 600; color: #555; margin-bottom: 5px; }
    input[type=text], input[type=date], input[type=url], textarea {
      width: 100%; border: 1.5px solid var(--border); border-radius: 10px;
      padding: 11px 13px; font-size: 15px; font-family: inherit;
      outline: none; transition: border-color .2s; background: #fafafa;
    }
    input:focus, textarea:focus { border-color: var(--green); background: #fff; }
    .hint { font-size: 11px; color: var(--sub); margin-top: 4px; }
    .date-row { display: flex; gap: 8px; align-items: center; }
    .date-row input { flex: 1; }
    .date-row .sep { color: var(--sub); font-size: 14px; flex-shrink: 0; }

    /* Buttons */
    .btn-primary { width: 100%; background: var(--green); color: #fff; border: none; border-radius: 12px; padding: 15px; font-size: 16px; font-weight: 700; cursor: pointer; }
    .btn-secondary { width: 100%; background: var(--bg); color: #555; border: none; border-radius: 12px; padding: 13px; font-size: 15px; cursor: pointer; margin-top: 8px; }
    .btn-sm { border: none; border-radius: 8px; padding: 6px 12px; font-size: 12px; font-weight: 500; cursor: pointer; }
    .btn-edit { background: #f0f0f0; color: #444; }
    .btn-del  { background: #fff1f0; color: var(--red); }
    .btn-link { background: #e8f4fd; color: #1a73e8; text-decoration: none; }
    .btn-save-gh { background: #24292e; color: #fff; border: none; border-radius: 8px; padding: 8px 14px; font-size: 13px; cursor: pointer; width: 100%; margin-top: 10px; }

    /* Monitor card */
    .monitor-row { display: flex; align-items: flex-start; gap: 12px; }
    .monitor-info { flex: 1; min-width: 0; }
    .monitor-name { font-weight: 600; font-size: 15px; overflow: hidden; white-space: nowrap; text-overflow: ellipsis; }
    .monitor-meta { font-size: 12px; color: var(--sub); margin-top: 3px; }
    .monitor-url  { font-size: 11px; color: #bbb; margin-top: 2px; overflow: hidden; white-space: nowrap; text-overflow: ellipsis; }
    .monitor-actions { display: flex; gap: 8px; margin-top: 10px; }

    /* Toggle */
    .toggle { position: relative; width: 46px; height: 27px; flex-shrink: 0; }
    .toggle input { display: none; }
    .toggle-slider { position: absolute; inset: 0; background: #ccc; border-radius: 14px; cursor: pointer; transition: .2s; }
    .toggle-slider::after { content: ''; position: absolute; left: 3px; top: 3px; width: 21px; height: 21px; background: #fff; border-radius: 50%; transition: .2s; box-shadow: 0 1px 3px rgba(0,0,0,.2); }
    .toggle input:checked + .toggle-slider { background: var(--green); }
    .toggle input:checked + .toggle-slider::after { transform: translateX(19px); }

    /* FAB */
    .fab { position: fixed; bottom: 28px; right: 20px; width: 58px; height: 58px; background: var(--green); color: #fff; border: none; border-radius: 50%; font-size: 30px; line-height: 1; cursor: pointer; box-shadow: 0 4px 14px rgba(3,199,90,.45); z-index: 100; display: flex; align-items: center; justify-content: center; }

    /* Bottom sheet modal */
    .overlay { position: fixed; inset: 0; background: rgba(0,0,0,.45); z-index: 200; display: none; align-items: flex-end; justify-content: center; }
    .overlay.open { display: flex; }
    .sheet { background: #fff; width: 100%; max-width: 768px; max-height: 92vh; border-radius: 22px 22px 0 0; overflow-y: auto; padding: 0 18px 32px; }
    .sheet-handle { width: 38px; height: 4px; background: #ddd; border-radius: 2px; margin: 14px auto 18px; }
    .sheet-title { font-size: 18px; font-weight: 700; margin-bottom: 20px; }

    /* Period list */
    .btn-add-period { background: var(--green); color: #fff; border: none; border-radius: 8px; padding: 10px 14px; font-size: 13px; font-weight: 600; cursor: pointer; white-space: nowrap; flex-shrink: 0; }
    .period-list { display: flex; flex-direction: column; gap: 6px; margin-top: 8px; }
    .period-tag { display: flex; align-items: center; justify-content: space-between; background: #f0fdf4; border: 1px solid #b7f5d0; border-radius: 8px; padding: 8px 12px; font-size: 13px; color: #1a5c34; }
    .period-tag span { flex: 1; }
    .period-tag button { background: none; border: none; color: #aaa; font-size: 18px; cursor: pointer; padding: 0 0 0 10px; line-height: 1; flex-shrink: 0; }
    .period-tag button:hover { color: var(--red); }
    .empty { text-align: center; padding: 60px 20px; color: var(--sub); }
    .empty-icon { font-size: 52px; margin-bottom: 14px; }

    .spinner { display: inline-block; width: 16px; height: 16px; border: 2px solid rgba(255,255,255,.5); border-top-color: #fff; border-radius: 50%; animation: spin .7s linear infinite; vertical-align: middle; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Bell */
    .header-row { display: flex; justify-content: space-between; align-items: flex-start; }
    .bell-btn { background: rgba(255,255,255,.2); border: none; border-radius: 50%; width: 40px; height: 40px; cursor: pointer; font-size: 18px; position: relative; flex-shrink: 0; display: flex; align-items: center; justify-content: center; }
    .bell-badge { position: absolute; top: 4px; right: 4px; background: #ff4d4f; color: #fff; font-size: 10px; font-weight: 700; min-width: 16px; height: 16px; border-radius: 8px; display: none; align-items: center; justify-content: center; padding: 0 3px; }
    .bell-badge.show { display: flex; }

    /* Notification panel */
    .notif-panel { position: fixed; top: 0; right: 0; bottom: 0; width: min(360px, 100vw); background: #fff; box-shadow: -4px 0 20px rgba(0,0,0,.15); z-index: 300; transform: translateX(100%); transition: transform .25s ease; display: flex; flex-direction: column; }
    .notif-panel.open { transform: translateX(0); }
    .notif-dim { position: fixed; inset: 0; background: rgba(0,0,0,.3); z-index: 299; display: none; }
    .notif-dim.open { display: block; }
    .notif-head { display: flex; align-items: center; justify-content: space-between; padding: 18px 16px 14px; border-bottom: 1px solid var(--border); flex-shrink: 0; }
    .notif-head h2 { font-size: 16px; font-weight: 700; }
    .notif-read-all { border: none; background: none; color: var(--green); font-size: 13px; cursor: pointer; font-weight: 600; }
    .notif-close { border: none; background: none; font-size: 22px; cursor: pointer; color: #888; line-height: 1; }
    .notif-list { flex: 1; overflow-y: auto; }
    .notif-item { display: flex; gap: 12px; padding: 14px 16px; border-bottom: 1px solid var(--border); cursor: pointer; text-decoration: none; color: inherit; }
    .notif-item:hover { background: #f9f9f9; }
    .notif-item.unread { background: #f0fdf4; }
    .notif-dot { width: 8px; height: 8px; background: var(--green); border-radius: 50%; flex-shrink: 0; margin-top: 5px; }
    .notif-dot.read { background: transparent; }
    .notif-body { flex: 1; min-width: 0; }
    .notif-title { font-weight: 600; font-size: 14px; }
    .notif-msg { font-size: 13px; color: #555; margin-top: 2px; }
    .notif-time { font-size: 11px; color: var(--sub); margin-top: 4px; }
    .notif-arrow { color: #ccc; font-size: 16px; align-self: center; }
    .notif-empty { text-align: center; padding: 60px 20px; color: var(--sub); font-size: 14px; }
  </style>
</head>
<body>

<header>
  <div class="header-row">
    <div>
      <h1>네이버 예약 모니터</h1>
      <p id="status">불러오는 중...</p>
    </div>
    <button class="bell-btn" onclick="openNotifPanel()">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="white" xmlns="http://www.w3.org/2000/svg">
        <path d="M12 22c1.1 0 2-.9 2-2h-4c0 1.1.9 2 2 2zm6-6V11c0-3.07-1.64-5.64-4.5-6.32V4c0-.83-.67-1.5-1.5-1.5S10.5 3.17 10.5 4v.68C7.63 5.36 6 7.92 6 11v5l-2 2v1h16v-1l-2-2z"/>
      </svg>
      <span class="bell-badge" id="bell-badge"></span>
    </button>
  </div>
</header>

<!-- 알림 패널 -->
<div class="notif-dim" id="notif-dim" onclick="closeNotifPanel()"></div>
<div class="notif-panel" id="notif-panel">
  <div class="notif-head">
    <h2>알림 내역</h2>
    <div style="display:flex;gap:12px;align-items:center">
      <button class="notif-read-all" onclick="markAllRead()">모두 읽음</button>
      <button class="notif-close" onclick="closeNotifPanel()">×</button>
    </div>
  </div>
  <div class="notif-list" id="notif-list"><div class="notif-empty">알림 내역이 없습니다</div></div>
</div>

<div class="content">

  <!-- Settings -->
  <div class="card">
    <div class="settings-header" onclick="toggleSettings()">
      <span>⚙️ 설정</span>
      <span id="settings-arrow">▼</span>
    </div>
    <div class="settings-body" id="settings-body">
      <div class="form-group" style="margin-top:14px">
        <label>GitHub Personal Access Token</label>
        <input type="text" id="pat" placeholder="ghp_xxxxxxxxxxxx" autocomplete="off">
        <div class="hint">github.com → Settings → Developer settings → Personal access tokens → Fine-grained<br>
        권한: <b>Contents Read/Write</b> (해당 레포만)</div>
      </div>
      <div class="form-group">
        <label>ntfy 채널</label>
        <input type="text" id="ntfy-topic" placeholder="naver-booking-alert">
      </div>
      <button class="btn-primary" id="save-btn" onclick="saveSettings()">저장</button>
    </div>
  </div>

  <!-- Monitor list -->
  <div id="list"></div>

</div>

<!-- FAB -->
<button class="fab" onclick="openSheet()">＋</button>

<!-- Add / Edit sheet -->
<div class="overlay" id="overlay" onclick="overlayClick(event)">
  <div class="sheet" id="sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-title" id="sheet-title">예약 모니터 추가</div>

    <div class="form-group">
      <label>이름</label>
      <input type="text" id="f-name" placeholder="예: 홍대 팝업스토어">
    </div>
    <div class="form-group">
      <label>네이버 예약 URL</label>
      <textarea id="f-url" rows="3" placeholder="https://m.booking.naver.com/booking/..."></textarea>
      <div class="hint">네이버 예약 페이지에서 URL을 복사해 붙여넣으세요</div>
    </div>
    <div class="form-group">
      <label>확인 기간</label>
      <div class="date-row">
        <input type="date" id="f-from">
        <span class="sep">~</span>
        <input type="date" id="f-to">
      </div>
      <div class="date-row" style="margin-top:8px">
        <input type="time" id="f-time-from">
        <span class="sep">~</span>
        <input type="time" id="f-time-to">
        <button type="button" class="btn-add-period" onclick="addPeriod()">추가</button>
      </div>
      <div class="hint">시간 미입력 → 전체 시간대 추적 · 기간 미추가 → 전체 날짜 모니터링</div>
      <div id="period-list" class="period-list"></div>
    </div>

    <button class="btn-primary" onclick="submitMonitor()">등록</button>
    <button class="btn-secondary" onclick="closeSheet()">취소</button>
  </div>
</div>

<script>
const OWNER = 'Gohyedeok';
const REPO  = 'naver-booking-monitor';
const FILE  = 'monitors.json';
const API   = `https://api.github.com/repos/${OWNER}/${REPO}/contents/${FILE}`;

let cfg = { ntfy_topic: '', monitors: [] };
let sha = '';
let editId = null;
let patMasked = false;
let periods = []; // [{from, to, timeFrom, timeTo}]

const $ = id => document.getElementById(id);
const getPAT = () => localStorage.getItem('gh_pat') || '';
const setPAT = v => localStorage.setItem('gh_pat', v);

// ── GitHub API ──────────────────────────────────────────────────────
async function apiFetch(method = 'GET', body = null) {
  const pat = getPAT();
  // GET 요청에 타임스탬프 추가 → 브라우저 캐시 방지
  const url = method === 'GET' ? `${API}?_=${Date.now()}` : API;
  const opts = {
    method,
    headers: { Authorization: `token ${pat}`, Accept: 'application/vnd.github.v3+json', 'Content-Type': 'application/json' }
  };
  if (body) opts.body = JSON.stringify(body);
  const res = await fetch(url, opts);
  if (!res.ok) throw new Error(`GitHub API ${res.status}`);
  return res.json();
}

async function loadConfig() {
  try {
    const data = await apiFetch();
    sha = data.sha;
    cfg = JSON.parse(decodeURIComponent(escape(atob(data.content.replace(/\n/g,'')))));
    render();
    setStatus(`${cfg.monitors.filter(m=>m.enabled).length}개 활성 / 전체 ${cfg.monitors.length}개`);
    $('ntfy-topic').value = cfg.ntfy_topic || '';
  } catch(e) {
    setStatus(`❌ 불러오기 실패 — 설정에서 Token을 확인하세요`);
  }
}

// 동시 저장 방지용 큐
let _saveQueue = Promise.resolve();

async function saveConfig(msg = 'update monitors') {
  const content = btoa(unescape(encodeURIComponent(JSON.stringify(cfg, null, 2))));
  // 이전 저장이 끝난 뒤 순서대로 실행 (동시 PUT 방지)
  const run = async () => {
    for (let attempt = 0; attempt < 3; attempt++) {
      const latest = await apiFetch();
      sha = latest.sha;
      try {
        const data = await apiFetch('PUT', { message: msg, content, sha });
        sha = data.content.sha;
        return;
      } catch(e) {
        if (!e.message.includes('409') || attempt === 2) throw e;
        await new Promise(r => setTimeout(r, 400));
      }
    }
  };
  _saveQueue = _saveQueue.catch(() => {}).then(run);
  return _saveQueue;
}

// ── Render ──────────────────────────────────────────────────────────
function render() {
  const el = $('list');
  if (!cfg.monitors.length) {
    el.innerHTML = `<div class="empty"><div class="empty-icon">🔔</div><div>모니터링 항목이 없어요<br><span style="font-size:13px;margin-top:6px;display:block">아래 <b>+</b> 버튼으로 추가하세요</span></div></div>`;
    return;
  }
  el.innerHTML = cfg.monitors.map(m => `
    <div class="card">
      <div class="monitor-row">
        <div class="monitor-info">
          <div class="monitor-name">${esc(m.name)}</div>
          <div class="monitor-meta">${fmtDates(m.target_dates)}</div>
          <div class="monitor-url">${esc(m.url)}</div>
        </div>
        <label class="toggle">
          <input type="checkbox" ${m.enabled?'checked':''} onchange="toggle('${m.id}',this.checked)">
          <span class="toggle-slider"></span>
        </label>
      </div>
      <div class="monitor-actions">
        <button class="btn-sm btn-edit" onclick="openEdit('${m.id}')">✏️ 수정</button>
        <button class="btn-sm btn-del"  onclick="del('${m.id}')">🗑️ 삭제</button>
        <a class="btn-sm btn-link" href="${esc(m.url)}" target="_blank" rel="noopener">🔗 예약</a>
      </div>
    </div>`).join('');
}

function fmtDates(dates) {
  if (!dates || !dates.length) return '전체 날짜';
  return parsePeriods(dates).map(p => {
    const d = p.from === p.to ? p.from.slice(5) : `${p.from.slice(5)}~${p.to.slice(5)}`;
    const t = p.timeFrom ? (p.timeFrom === p.timeTo ? ` ${p.timeFrom}` : ` ${p.timeFrom}~${p.timeTo}`) : '';
    return d + t;
  }).join(' / ');
}

// target_dates → [{from, to, timeFrom, timeTo}] 역변환
function parsePeriods(dates) {
  if (!dates || !dates.length) return [];
  const groups = {};
  for (const entry of dates) {
    const sp = entry.indexOf(' ');
    const d = sp >= 0 ? entry.slice(0, sp) : entry;
    const t = sp >= 0 ? entry.slice(sp + 1) : '';
    if (!groups[t]) groups[t] = [];
    groups[t].push(d);
  }
  const result = [];
  for (const [tPart, ds] of Object.entries(groups)) {
    ds.sort();
    let from = ds[0], to = ds[0];
    for (let i = 1; i < ds.length; i++) {
      if ((new Date(ds[i]) - new Date(to)) / 86400000 === 1) { to = ds[i]; }
      else { result.push(makePeriod(from, to, tPart)); from = to = ds[i]; }
    }
    result.push(makePeriod(from, to, tPart));
  }
  return result;
}

function makePeriod(from, to, tPart) {
  if (!tPart) return {from, to, timeFrom: '', timeTo: ''};
  const h = tPart.indexOf('-', 3); // HH:MM-HH:MM 형식
  if (h > 0) return {from, to, timeFrom: tPart.slice(0, h), timeTo: tPart.slice(h + 1)};
  return {from, to, timeFrom: tPart, timeTo: tPart}; // 단일 시간 (하위 호환)
}

// 구간 추가
function addPeriod() {
  const from     = $('f-from').value;
  const to       = $('f-to').value || from;
  const timeFrom = $('f-time-from').value;
  const timeTo   = $('f-time-to').value;
  if (!from) { alert('시작 날짜를 입력하세요'); return; }
  if (from > to) { alert('시작일이 종료일보다 늦습니다'); return; }
  if ((timeFrom && !timeTo) || (!timeFrom && timeTo)) { alert('시작 시간과 종료 시간을 모두 입력하거나 모두 비워주세요'); return; }
  if (timeFrom && timeTo && timeFrom > timeTo) { alert('시작 시간이 종료 시간보다 늦습니다'); return; }
  periods.push({from, to, timeFrom, timeTo});
  renderPeriodList();
  $('f-from').value = ''; $('f-to').value = '';
  $('f-time-from').value = ''; $('f-time-to').value = '';
}

function removePeriod(i) { periods.splice(i, 1); renderPeriodList(); }

function renderPeriodList() {
  const el = $('period-list');
  if (!periods.length) { el.innerHTML = ''; return; }
  el.innerHTML = periods.map((p, i) => {
    const dLabel = p.from === p.to ? p.from.slice(5) : `${p.from.slice(5)} ~ ${p.to.slice(5)}`;
    const tLabel = p.timeFrom
      ? (p.timeFrom === p.timeTo ? ` · ${p.timeFrom}` : ` · ${p.timeFrom} ~ ${p.timeTo}`)
      : ' · 전체 시간';
    return `<div class="period-tag"><span>${dLabel}${tLabel}</span><button type="button" onclick="removePeriod(${i})" title="삭제">×</button></div>`;
  }).join('');
}
function esc(s) { return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function setStatus(msg) { $('status').textContent = msg; }

// ── Settings ────────────────────────────────────────────────────────
function toggleSettings() {
  $('settings-body').classList.toggle('open');
  $('settings-arrow').textContent = $('settings-body').classList.contains('open') ? '▲' : '▼';
}

async function saveSettings() {
  const btn = $('save-btn');
  const patVal = $('pat').value.trim();
  const ntfy   = $('ntfy-topic').value.trim();

  if (patVal && !patVal.startsWith('••')) setPAT(patVal);
  if (!getPAT()) { alert('GitHub Token을 입력하세요'); return; }

  btn.innerHTML = '<span class="spinner"></span>';
  btn.disabled = true;
  try {
    // sha가 없으면 먼저 최신 파일 정보 가져오기
    const data = await apiFetch();
    sha = data.sha;
    cfg = JSON.parse(decodeURIComponent(escape(atob(data.content.replace(/\n/g,'')))));
    if (ntfy) cfg.ntfy_topic = ntfy;
    await saveConfig('update settings');
    alert('저장됐습니다!');
    toggleSettings();
    render();
    setStatus(`${cfg.monitors.filter(m=>m.enabled).length}개 활성 / 전체 ${cfg.monitors.length}개`);
  } catch(e) { alert(`저장 실패: ${e.message}`); }
  finally { btn.innerHTML = '저장'; btn.disabled = false; }
}

// ── Sheet ───────────────────────────────────────────────────────────
function openSheet() {
  editId = null;
  $('sheet-title').textContent = '예약 모니터 추가';
  $('f-name').value = '';
  $('f-url').value  = '';
  $('f-from').value = ''; $('f-to').value = '';
  $('f-time-from').value = ''; $('f-time-to').value = '';
  periods = [];
  renderPeriodList();
  $('overlay').classList.add('open');
}

function openEdit(id) {
  const m = cfg.monitors.find(x => x.id === id);
  if (!m) return;
  editId = id;
  $('sheet-title').textContent = '예약 모니터 수정';
  $('f-name').value = m.name;
  $('f-url').value  = m.url;
  $('f-from').value = ''; $('f-to').value = '';
  $('f-time-from').value = ''; $('f-time-to').value = '';
  periods = parsePeriods(m.target_dates || []);
  renderPeriodList();
  $('overlay').classList.add('open');
}

function closeSheet() { $('overlay').classList.remove('open'); }
function overlayClick(e) { if (e.target === $('overlay')) closeSheet(); }

function genDates(from, to) {
  const out = [], d = new Date(from), end = new Date(to);
  while (d <= end) { out.push(d.toISOString().slice(0,10)); d.setDate(d.getDate()+1); }
  return out;
}

async function submitMonitor() {
  const name = $('f-name').value.trim();
  const url  = $('f-url').value.trim();

  if (!name) { alert('이름을 입력하세요'); return; }
  if (!url || !url.includes('booking.naver.com')) { alert('네이버 예약 URL을 입력하세요'); return; }

  // 입력 중인 기간이 있으면 자동 추가
  const pendingFrom = $('f-from').value;
  const pendingTo   = $('f-to').value || pendingFrom;
  if (pendingFrom) {
    const ptf = $('f-time-from').value, ptt = $('f-time-to').value;
    if (pendingFrom > pendingTo) { alert('시작일이 종료일보다 늦습니다'); return; }
    if ((ptf && !ptt) || (!ptf && ptt)) { alert('시작 시간과 종료 시간을 모두 입력하거나 모두 비워주세요'); return; }
    if (ptf && ptt && ptf > ptt) { alert('시작 시간이 종료 시간보다 늦습니다'); return; }
    periods.push({from: pendingFrom, to: pendingTo, timeFrom: ptf, timeTo: ptt});
    renderPeriodList();
    $('f-from').value = ''; $('f-to').value = '';
    $('f-time-from').value = ''; $('f-time-to').value = '';
  }

  const target_dates = [];
  for (const p of periods) {
    for (const d of genDates(p.from, p.to)) {
      if (p.timeFrom) {
        target_dates.push(p.timeFrom === p.timeTo ? `${d} ${p.timeFrom}` : `${d} ${p.timeFrom}-${p.timeTo}`);
      } else {
        target_dates.push(d);
      }
    }
  }

  if (editId) {
    const m = cfg.monitors.find(x => x.id === editId);
    if (m) Object.assign(m, { name, url, target_dates });
  } else {
    cfg.monitors.push({ id: Date.now().toString(36), name, url, enabled: true, target_dates });
  }

  try {
    await saveConfig(editId ? '수정' : '추가: ' + name);
    closeSheet();
    render();
    setStatus(`${cfg.monitors.filter(m=>m.enabled).length}개 활성 / 전체 ${cfg.monitors.length}개`);
  } catch(e) { alert(`저장 실패: ${e.message}`); }
}

// ── Actions ─────────────────────────────────────────────────────────
async function toggle(id, enabled) {
  const m = cfg.monitors.find(x => x.id === id);
  if (!m) return;
  m.enabled = enabled;
  try {
    await saveConfig(enabled ? `활성화: ${m.name}` : `비활성화: ${m.name}`);
    setStatus(`${cfg.monitors.filter(m=>m.enabled).length}개 활성 / 전체 ${cfg.monitors.length}개`);
  } catch(e) { m.enabled = !enabled; render(); alert(`저장 실패: ${e.message}`); }
}

async function del(id) {
  const m = cfg.monitors.find(x => x.id === id);
  if (!m || !confirm(`'${m.name}' 을(를) 삭제할까요?`)) return;
  cfg.monitors = cfg.monitors.filter(x => x.id !== id);
  try {
    await saveConfig(`삭제: ${m.name}`);
    render();
    setStatus(`${cfg.monitors.filter(m=>m.enabled).length}개 활성 / 전체 ${cfg.monitors.length}개`);
  } catch(e) { alert(`삭제 실패: ${e.message}`); }
}

// ── Notifications ────────────────────────────────────────────────────
let notifData = [];
let lastReadTime = parseInt(localStorage.getItem('notif_last_read') || '0');

function relTime(ts) {
  const d = Math.floor(Date.now() / 1000) - ts;
  if (d < 60) return '방금';
  if (d < 3600) return `${Math.floor(d/60)}분 전`;
  if (d < 86400) return `${Math.floor(d/3600)}시간 전`;
  return `${Math.floor(d/86400)}일 전`;
}

async function fetchNotifications() {
  const topic = cfg.ntfy_topic;
  if (!topic) return;
  try {
    const res = await fetch(`https://ntfy.sh/${topic}/json?poll=1&since=168h`);
    const text = await res.text();
    notifData = text.trim().split('\n')
      .filter(l => l.trim())
      .map(l => JSON.parse(l))
      .filter(n => n.event === 'message')
      .reverse();
    updateBadge();
  } catch(e) { console.error('알림 조회 실패', e); }
}

function updateBadge() {
  const unread = notifData.filter(n => n.time > lastReadTime).length;
  const badge = $('bell-badge');
  badge.textContent = unread > 9 ? '9+' : unread;
  badge.classList.toggle('show', unread > 0);
}

function renderNotifList() {
  const el = $('notif-list');
  if (!notifData.length) {
    el.innerHTML = '<div class="notif-empty">알림 내역이 없습니다</div>';
    return;
  }
  el.innerHTML = notifData.map(n => {
    const unread = n.time > lastReadTime;
    const url = n.click || '#';
    return `<a class="notif-item ${unread ? 'unread' : ''}" href="${esc(url)}" target="_blank" rel="noopener" onclick="markAllRead()">
      <span class="notif-dot ${unread ? '' : 'read'}"></span>
      <div class="notif-body">
        <div class="notif-title">${esc(n.title || '알림')}</div>
        <div class="notif-msg">${esc(n.message || '')}</div>
        <div class="notif-time">${relTime(n.time)}</div>
      </div>
      <span class="notif-arrow">›</span>
    </a>`;
  }).join('');
}

async function openNotifPanel() {
  $('notif-panel').classList.add('open');
  $('notif-dim').classList.add('open');
  await fetchNotifications();
  renderNotifList();
}

function closeNotifPanel() {
  $('notif-panel').classList.remove('open');
  $('notif-dim').classList.remove('open');
}

function markAllRead() {
  if (!notifData.length) return;
  lastReadTime = notifData[0].time;
  localStorage.setItem('notif_last_read', lastReadTime);
  updateBadge();
  renderNotifList();
}

// ── Init ────────────────────────────────────────────────────────────
window.onload = () => {
  const pat = getPAT();
  if (pat) { $('pat').value = '••••••' + pat.slice(-4); patMasked = true; }
  loadConfig().then(() => fetchNotifications());
};
</script>
